[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# [Sprint Ponder revival] Re-enabled. The 2026 crashes (#27-#30) that caused
# the parking were the config/event-arg bugs already fixed on main in PR #47
# (old `networks` API vs ponder@0.16 `chains`; handlers referencing
# non-existent event args; ABIs cast `as never`). `npm run concurrent` boots
# API + indexer; it NO LONGER uses --kill-others-on-fail and adds
# --restart-tries, so an indexer crash can never take the API down — it
# auto-restarts the indexer while the API (and the on-chain /public/*
# fallbacks) keep serving. Requires DATABASE_URL; without it the indexer
# endpoints return a clean 5xx, API unaffected.
startCommand = "npm run concurrent"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
healthcheckPath = "/health"
healthcheckTimeout = 30

# Required env vars (set these in Railway dashboard, not here):
#   PORT, NODE_ENV, RPC_URL, CHAIN_ID, RELAYER_PRIVATE_KEY, ADMIN_TOKEN,
#   LUMINA_TOKEN, CLAIM_BOND, BOND_VAULT, POLICY_MANAGER, COVER_ROUTER,
#   MARKETPLACE, USDC, DB_PATH
# [Sprint K] additional vars for the Ponder indexer:
#   DATABASE_URL                  ← Postgres plugin attaches automatically
#   RPC_URL_QUICKNODE             ← Sprint F multi-RPC primary for indexer
#   FOUNDER_VESTING               ← address of FounderVesting (defaults to manifest)
#   TWAP_BURNER                   ← address of TWAPBurner (defaults to manifest)
#   DEPLOYMENT_BLOCK_CLAIMBOND    ← block where Sprint C deploy started; lookup
#                                   in BaseScan if unset
